<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphKnows Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        :root {
            --md-sys-color-surface: #1e1f20;
            --md-sys-color-surface-container: #28292a;
            --md-sys-color-primary: #a8c7fa;
            --md-sys-color-on-surface: #e3e3e3;
            --md-sys-color-outline: #8e918f;
        }

        body {
            background-color: #121212;
            color: var(--md-sys-color-on-surface);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #616161;
        }

        #graph-container {
            width: 100%;
            height: 100%;
            background-color: #121212;
        }

        .node circle {
            stroke: #121212;
            stroke-width: 1.5px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .node text {
            font-family: 'Roboto', sans-serif;
            pointer-events: none;
            text-shadow: 0 1px 2px #000;
        }

        .link {
            stroke: #444746;
            stroke-opacity: 0.6;
            transition: all 0.2s;
            cursor: pointer;
        }

        .link:hover {
            stroke-opacity: 1;
            stroke: var(--md-sys-color-primary);
            stroke-width: 2px;
        }

        .graph-tooltip {
            position: absolute;
            background: #333537;
            border: 1px solid #444746;
            border-radius: 8px;
            padding: 12px;
            pointer-events: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            font-size: 12px;
            z-index: 50;
            max-width: 250px;
            opacity: 0;
            transition: opacity 0.2s;
        }
    </style>
</head>

<body class="flex h-screen w-screen overflow-hidden">

    <!-- Left Panel: Chat -->
    <aside class="w-[400px] flex-shrink-0 flex flex-col border-r border-[#444746] bg-[#1e1f20] relative z-20">
        <header class="h-16 flex items-center gap-3 px-5 border-b border-[#444746] shrink-0">
            <div class="w-8 h-8 rounded-full bg-indigo-500/10 flex items-center justify-center text-[#a8c7fa]">
                <span class="material-icons-round text-xl">hub</span>
            </div>
            <h1 class="font-medium text-lg tracking-wide text-[#e3e3e3]">GraphKnows</h1>
        </header>

        <!-- Stats -->
        <div class="px-5 py-4 border-b border-[#444746]/50">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-[#28292a] rounded-lg p-3 border border-[#444746]">
                    <div class="text-[10px] uppercase font-bold text-[#8e918f] mb-1">Nodes</div>
                    <div class="text-xl font-light text-[#e3e3e3]" id="stat-nodes">0</div>
                </div>
                <div class="bg-[#28292a] rounded-lg p-3 border border-[#444746]">
                    <div class="text-[10px] uppercase font-bold text-[#8e918f] mb-1">Edges</div>
                    <div class="text-xl font-light text-[#e3e3e3]" id="stat-edges">0</div>
                </div>
            </div>
            <!-- PGVector Stats -->
            <div class="mt-4 bg-[#28292a] rounded-lg p-3 border border-[#444746]">
                <div class="flex items-center justify-between mb-2">
                    <div class="text-[10px] uppercase font-bold text-[#8e918f]">PGVector</div>
                    <button onclick="fetchPgStats()" class="text-[#a8c7fa] hover:text-[#d6e3ff] cursor-pointer"
                        title="Refresh PG Stats">
                        <span class="material-icons-round text-[14px]">refresh</span>
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div><span class="text-[#c4c7c5] block">Vectors</span><span class="text-[#e3e3e3] font-mono"
                            id="pg-count">-</span></div>
                    <div><span class="text-[#c4c7c5] block">Size</span><span class="text-[#e3e3e3] font-mono"
                            id="pg-size">-</span></div>
                </div>
            </div>
        </div>

        <!-- DB Tools -->
        <div class="px-5 py-4 border-b border-[#444746]/50 space-y-3">
            <div class="text-[10px] uppercase font-bold text-[#8e918f] tracking-wider flex justify-between">
                <span>Database Tools</span>
                <span id="limit-display" class="text-[#a8c7fa]">Limit: 100</span>
            </div>

            <div class="flex items-center gap-2">
                <input type="range" id="query-limit" min="10" max="500" value="100" step="10"
                    class="w-full h-1 bg-[#444746] rounded-lg appearance-none cursor-pointer accent-[#a8c7fa]"
                    oninput="document.getElementById('limit-display').innerText = 'Limit: ' + this.value">
            </div>

            <button onclick="runLimitedSample()"
                class="w-full bg-[#333537] hover:bg-[#444746] text-[#e3e3e3] rounded-lg px-3 py-2 flex items-center justify-between text-xs font-medium border border-[#444746] transition-colors">
                <span>Load Graph Sample</span>
                <span class="material-icons-round text-sm">play_arrow</span>
            </button>
        </div>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-6 scroll-smooth">
            <div class="flex flex-col items-center justify-center h-full text-[#c4c7c5] gap-3 opacity-50">
                <span class="material-icons-round text-5xl text-[#444746]">chat</span>
                <p class="text-sm">Chat to explore the graph</p>
            </div>
        </div>

        <div class="p-4 bg-[#1e1f20] border-t border-[#444746]">
            <div
                class="relative bg-[#28292a] rounded-[24px] border border-[#444746] focus-within:border-[#a8c7fa] focus-within:ring-1 focus-within:ring-[#a8c7fa] transition-all">
                <div class="flex items-center px-2 py-1.5">
                    <input type="text" id="chat-input"
                        class="flex-1 bg-transparent border-none px-3 py-2 text-sm text-[#e3e3e3] focus:outline-none placeholder-[#8e918f]"
                        placeholder="Ask a question..." autocomplete="off"
                        onkeydown="if(event.key === 'Enter') sendMessage()">

                    <button onclick="sendMessage()"
                        class="p-2 ml-1 bg-[#a8c7fa] hover:bg-[#d6e3ff] text-[#062e6f] rounded-full transition-colors shadow-sm disabled:opacity-50">
                        <span class="material-icons-round text-lg">arrow_upward</span>
                    </button>
                </div>
            </div>
            <div class="flex items-center justify-between mt-2 px-2">
                <label class="flex items-center gap-2 cursor-pointer group select-none">
                    <input type="checkbox" id="use-agent" class="accent-[#a8c7fa] w-3 h-3 rounded-sm" checked>
                    <span class="text-[11px] font-medium text-[#c4c7c5] group-hover:text-[#e3e3e3]">Deep
                        Reasoning</span>
                </label>
                <span id="chat-status" class="text-[10px] font-medium text-[#a8c7fa] hidden flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-[#a8c7fa] animate-pulse"></span>
                    Processing...
                </span>
            </div>
        </div>
    </aside>

    <!-- Right Panel: Graph -->
    <main class="flex-1 relative bg-[#121212] flex flex-col overflow-hidden">

        <!-- Stats Removed -->


        <!-- Stats -->

        <!-- D3 Container -->
        <div id="graph-container"></div>
        <div id="graph-tooltip" class="graph-tooltip"></div>
        <div id="search-results"
            class="absolute top-14 left-4 w-64 bg-[#28292a] border border-[#444746] rounded-lg shadow-xl hidden flex-col max-h-60 overflow-y-auto z-20">
        </div>

        <!-- Node Details -->
        <div id="node-details"
            class="absolute top-4 bottom-4 right-4 w-80 bg-[#1e1f20]/95 backdrop-blur rounded-xl border border-[#444746] shadow-2xl translate-x-[110%] transition-transform duration-300 flex flex-col z-20 pointer-events-auto">
            <div class="p-4 border-b border-[#444746] flex justify-between items-start">
                <h3 id="detail-title" class="font-bold text-[#e3e3e3] text-lg leading-tight break-words pr-2"></h3>
                <button onclick="closeDetails()" class="text-[#c4c7c5] hover:text-[#e3e3e3]"><span
                        class="material-icons-round">close</span></button>
            </div>
            <div id="detail-content" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
            <div id="expand-button-container" class="p-4 border-t border-[#444746]">
                <button onclick="expandSelectedNode()"
                    class="w-full bg-[#a8c7fa] text-[#062e6f] py-2 rounded-lg text-sm font-medium hover:bg-[#d6e3ff] flex items-center justify-center gap-2">
                    <span class="material-icons-round text-sm">unfold_more</span> Expand
                </button>
            </div>
        </div>
    </main>

    <script src="/static/script.js?v=3"></script>
</body>

</html>
