services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
      - "3001:3000"
    volumes:
      - falkordb_data:/data
    restart: always

  pgvector:
    image: pgvector/pgvector:0.8.1-pg18-trixie
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=graphknows
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: always

  langfuse-server:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=mysecret
      - SALT=mysalt
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false
    restart: always

  langfuse-db:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - langfuse_data:/var/lib/postgresql/data

  graphrag:
    build: ./services/graphrag
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=falkordb:6379
      - FALKORDB_HOST=falkordb
      - POSTGRES_HOST=pgvector
    volumes:
      - ./config.yaml:/app/config.yaml
    depends_on:
      - falkordb
      - pgvector

  graphgen:
    build: ./services/graphgen
    environment:
      - DATABASE_URL=falkordb:6379
      - FALKORDB_HOST=falkordb
      - POSTGRES_HOST=pgvector
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./input:/app/input
      - ./output:/app/output
    depends_on:
      - falkordb
      - pgvector

volumes:
  falkordb_data:
  pgvector_data:
  langfuse_data:
