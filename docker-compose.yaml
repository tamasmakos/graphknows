# docker-compose.yaml — production service definitions
# Override with docker-compose.dev.yaml for local development
# Usage: docker compose up -d
#        docker compose --profile observability up -d   (adds Langfuse)
version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  neo4j:
    image: neo4j:5.26-community
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH:-neo4j/changeme}"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:7474" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  pgvector:
    # REMOVED: pgvector is no longer used. Neo4j Community 5.11+ provides
    # unlimited vector indexes covering Chunk.embedding and Entity.embedding.
    # This stub is kept commented out to avoid breaking existing .env files.
    image: pgvector/pgvector:pg16
    profiles: [ "legacy-pgvector" ]
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-graphknows}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Application Services ────────────────────────────────────────────────────

  graphgen:
    build:
      context: .
      dockerfile: services/graphgen/Dockerfile
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    environment:
      NEO4J_URI: "${NEO4J_URI:-bolt://neo4j:7687}"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-changeme}"
      LLM_GROQ_API_KEY: "${LLM_GROQ_API_KEY:-}"
      LLM_OPENAI_API_KEY: "${LLM_OPENAI_API_KEY:-}"
      LLM_PROVIDER: "${LLM_PROVIDER:-groq}"
      LLM_MODEL: "${LLM_MODEL:-llama-3.3-70b-versatile}"
      GRAPHGEN_INPUT_DIR: "${GRAPHGEN_INPUT_DIR:-/data/input}"
      GRAPHGEN_OUTPUT_DIR: "${GRAPHGEN_OUTPUT_DIR:-/data/output}"
      PYTHONPATH: /app/src
    ports:
      - "8020:8000"
    volumes:
      - graphgen_input:/data/input
      - graphgen_output:/data/output
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  graphrag:
    build:
      context: .
      dockerfile: services/graphrag/Dockerfile
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    environment:
      NEO4J_URI: "${NEO4J_URI:-bolt://neo4j:7687}"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-changeme}"
      LLM_GROQ_API_KEY: "${LLM_GROQ_API_KEY:-}"
      LLM_OPENAI_API_KEY: "${LLM_OPENAI_API_KEY:-}"
      LLM_PROVIDER: "${LLM_PROVIDER:-groq}"
      LLM_MODEL: "${LLM_MODEL:-llama-3.3-70b-versatile}"
      LANGFUSE_HOST: "${LANGFUSE_HOST:-http://langfuse:3000}"
      LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY:-}"
      LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY:-}"
      GRAPHRAG_KEYWORDS_MODEL: "${GRAPHRAG_KEYWORDS_MODEL:-llama-3.1-8b-instant}"
      GRAPHRAG_CHAT_MODEL: "${GRAPHRAG_CHAT_MODEL:-llama-3.3-70b-versatile}"
      PYTHONPATH: /app/src
    ports:
      - "8010:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # ── Observability (optional profile) ────────────────────────────────────────

  langfuse:
    image: langfuse/langfuse:2.95.0
    profiles: [ "observability" ]
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "${LANGFUSE_DATABASE_URL:-postgresql://langfuse:langfuse@langfuse-db:5432/langfuse}"
      NEXTAUTH_SECRET: "${LANGFUSE_NEXTAUTH_SECRET:-change-me-in-production}"
      SALT: "${LANGFUSE_SALT:-change-me-in-production}"
      NEXTAUTH_URL: "http://localhost:3000"
      TELEMETRY_ENABLED: "false"
    restart: unless-stopped

  langfuse-db:
    image: postgres:16.6-alpine
    profiles: [ "observability" ]
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U langfuse -d langfuse" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - langfuse_data:/var/lib/postgresql/data

volumes:
  neo4j_data:
  pgvector_data:
  graphgen_input:
  graphgen_output:
  langfuse_data:
