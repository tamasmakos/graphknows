services:
  # --- Infrastructure ---
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379" # Internal & Local access
      - "3001:3000" # Dashboard
    volumes:
      - falkordb_data:/data
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_DB=graphknows
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-server:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=mysecret
      - SALT=mysalt
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false
    restart: always

  langfuse-db:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U langfuse -d langfuse" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - langfuse_data:/var/lib/postgresql/data

  # --- Application Services ---
  graphgen:
    build:
      context: .
      dockerfile: services/graphgen/Dockerfile
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - FALKORDB_HOST=falkordb
      - POSTGRES_HOST=pgvector
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONPATH=/app/src
    ports:
      - "8020:8000" # Host:Container
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./services/graphgen/src:/app/src
    depends_on:
      falkordb:
        condition: service_healthy
      pgvector:
        condition: service_healthy

  graphrag:
    build:
      context: .
      dockerfile: services/graphrag/Dockerfile
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - FALKORDB_HOST=falkordb
      - POSTGRES_HOST=pgvector
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=http://langfuse-server:3000
      - PYTHONPATH=/app/src
    ports:
      - "8010:8000" # Host:Container
    volumes:
      - ./services/graphrag/src:/app/src
    depends_on:
      falkordb:
        condition: service_healthy
      pgvector:
        condition: service_healthy

  # Devcontainer attachment point — VS Code "Reopen in Container" connects here.
  workspace:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    command: sleep infinity
    volumes:
      - .:/workspace:cached
    working_dir: /workspace
    environment:
      - FALKORDB_HOST=falkordb
      - POSTGRES_HOST=pgvector
    depends_on:
      falkordb:
        condition: service_healthy
      pgvector:
        condition: service_healthy

volumes:
  falkordb_data:
  pgvector_data:
  langfuse_data:
