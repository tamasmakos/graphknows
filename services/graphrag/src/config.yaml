#
# Application-specific configuration for the KG chat/agent.
#
# This is intentionally separate from the top-level `config.yaml` used by
# the ingestion / pipeline so that runtime concerns (DB host, LLM, etc.)
# can be tuned independently.
#

llm:
  model: llama-3.3-70b-versatile
  temperature: 0.0

embeddings:
  model: all-MiniLM-L6-v2
  batch_size: 32

falkordb:
  host: localhost
  port: 6379
  database: kg
  clean_database: false
  upload_enabled: true




