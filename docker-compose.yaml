services:
  # --- Infrastructure ---
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
      - "3001:3000"
    volumes:
      - falkordb_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_DB=graphknows
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-server:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=mysecret
      - SALT=mysalt
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false
    restart: always

  langfuse-db:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U langfuse -d langfuse" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - langfuse_data:/var/lib/postgresql/data

  # --- Application Services ---
  graphgen:
    build:
      context: services/graphgen
      dockerfile: Dockerfile
    environment:
      - FALKORDB_HOST=falkordb
      - POSTGRES_HOST=pgvector
      - INPUT_DIR=/app/input
      - OUTPUT_DIR=/app/output
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./input:/app/input
      - ./output:/app/output
    depends_on:
      falkordb:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    ports:
      - "8020:8000" # Map to 8020 (GraphGen API)

  graphrag:
    build:
      context: services/graphrag
      dockerfile: Dockerfile
    environment:
      - FALKORDB_HOST=falkordb
      - POSTGRES_HOST=pgvector
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=http://langfuse-server:3000
    ports:
      - "8010:8000" # Map to 8010 (GraphRAG API)
    depends_on:
      falkordb:
        condition: service_healthy
      pgvector:
        condition: service_healthy

  # --- Dev/Master Environment ---
  dev-environment:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspaces/kg:cached
    command: sleep infinity
    environment:
      - FALKORDB_HOST=falkordb
      - POSTGRES_HOST=pgvector
      - GRAPHGEN_URL=http://graphgen:8000
      - GRAPHRAG_URL=http://graphrag:8000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      graphgen:
        condition: service_started
      graphrag:
        condition: service_started
    ports:
      - "8000:8000" # For Dashboard if started manually
      - "8001:8001" # For Dashboard API

volumes:
  falkordb_data:
  pgvector_data:
  langfuse_data: