services:
  graphgen:
    # Mount local code into container for hot-reloading
    volumes:
      - ./services/graphgen/src:/app/src
      # Mount input/output locally so you can see files generated by the app
      - ./input:/app/input
      - ./output:/app/output
    # Override the default command to enable --reload
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONPATH=/app/src

  graphrag:
    # Mount local code into container for hot-reloading
    volumes:
      - ./services/graphrag/src:/app/src
    # Override the default command to enable --reload
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONPATH=/app/src
