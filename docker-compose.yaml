services:
  # --- Infrastructure ---
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6380:6379" # Internal & Local access
      - "3001:3000" # Dashboard
    volumes:
      - falkordb_data:/data
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_DB=graphknows
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Application Services ---
  graphgen:
    build:
      context: services/graphgen
      dockerfile: Dockerfile
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - FALKORDB_HOST=falkordb
      - POSTGRES_HOST=pgvector
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONPATH=/app/src
    ports:
      - "8020:8000" # Host:Container
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./services/graphgen/src:/app/src
    depends_on:
      falkordb:
        condition: service_healthy
      pgvector:
        condition: service_healthy

  graphrag:
    build:
      context: services/graphrag
      dockerfile: Dockerfile
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - FALKORDB_HOST=falkordb
      - POSTGRES_HOST=pgvector
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=http://host.docker.internal:3000
      - PYTHONPATH=/app/src
    ports:
      - "8010:8000" # Host:Container
    volumes:
      - ./services/graphrag/src:/app/src
    depends_on:
      falkordb:
        condition: service_healthy
      pgvector:
        condition: service_healthy

volumes:
  falkordb_data:
  pgvector_data:
