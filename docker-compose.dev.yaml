# docker-compose.dev.yaml — development overrides
# Usage: docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up -d
services:
  graphgen:
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./services/graphgen/src:/app/src:cached
      - ./input:/data/input:cached
      - ./output:/data/output

  graphrag:
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./services/graphrag/src:/app/src:cached
